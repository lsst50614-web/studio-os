<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>晨嵐音樂</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #080a0d;
      --surface: #10141a;
      --surface-2: #151b23;
      --surface-3: #1d2530;
      --line: #27313f;
      --muted: #8b98a8;
      --text: #eef3f8;
      --soft: #c9d3df;
      --green: #4fd18b;
      --yellow: #f2bd58;
      --red: #ff6f7d;
      --cyan: #55c8e8;
      --blue: #7798ff;
      --magenta: #d679ff;
      --shadow: 0 18px 60px rgba(0, 0, 0, .38);
      --radius: 8px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(85, 200, 232, .14), transparent 28rem),
        linear-gradient(160deg, #080a0d 0%, #0d1116 48%, #090b0f 100%);
      color: var(--text);
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app-shell {
      width: min(100%, 430px);
      min-height: 100vh;
      margin: 0 auto;
      background: rgba(8, 10, 13, .72);
      border-left: 1px solid rgba(255, 255, 255, .05);
      border-right: 1px solid rgba(255, 255, 255, .05);
      position: relative;
      overflow: hidden;
    }

    .screen {
      min-height: 100vh;
      padding: 22px 18px 96px;
    }

    .login-screen {
      display: grid;
      align-content: center;
      gap: 18px;
      padding-bottom: 22px;
    }

    .brand {
      display: grid;
      gap: 12px;
      margin-bottom: 6px;
    }

    .mark {
      width: 56px;
      height: 56px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--cyan), var(--magenta));
      color: #071015;
      font-weight: 900;
      letter-spacing: 0;
      box-shadow: 0 14px 40px rgba(85, 200, 232, .24);
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    h1 {
      font-size: 36px;
      line-height: 1.05;
      letter-spacing: 0;
    }

    h2 {
      font-size: 24px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    h3 {
      font-size: 16px;
      line-height: 1.3;
      letter-spacing: 0;
    }

    .muted {
      color: var(--muted);
      line-height: 1.55;
    }

    .panel,
    .case-card,
    .metric,
    .finance-row,
    .record-row,
    .expense-row,
    .pay-row {
      background: linear-gradient(180deg, rgba(21, 27, 35, .96), rgba(16, 20, 26, .96));
      border: 1px solid rgba(255, 255, 255, .07);
      border-radius: var(--radius);
      box-shadow: 0 10px 30px rgba(0, 0, 0, .18);
    }

    .panel {
      padding: 16px;
    }

    .field {
      display: grid;
      gap: 8px;
      margin-bottom: 14px;
    }

    label {
      color: var(--soft);
      font-size: 13px;
      font-weight: 700;
    }

    input,
    select,
    textarea {
      width: 100%;
      min-height: 46px;
      color: var(--text);
      background: #0b0f14;
      border: 1px solid var(--line);
      border-radius: 8px;
      outline: 0;
      padding: 11px 12px;
    }

    textarea {
      min-height: 92px;
      resize: vertical;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 0 3px rgba(85, 200, 232, .14);
    }

    .chip,
    .icon-btn,
    .primary,
    .ghost {
      min-height: 42px;
      border-radius: 8px;
      color: var(--text);
      border: 1px solid var(--line);
      background: var(--surface-2);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-weight: 800;
    }

    .chip.active {
      border-color: rgba(85, 200, 232, .8);
      background: rgba(85, 200, 232, .14);
      color: #dff8ff;
    }

    .primary {
      width: 100%;
      background: linear-gradient(135deg, var(--cyan), var(--green));
      color: #061014;
      border: 0;
      min-height: 48px;
    }

    .ghost {
      background: transparent;
      min-height: 38px;
      padding: 0 12px;
    }

    .error {
      color: var(--red);
      min-height: 20px;
      font-size: 13px;
      font-weight: 700;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 18px;
    }

    .user-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 7px 10px;
      color: var(--soft);
      background: rgba(16, 20, 26, .78);
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .grid {
      display: grid;
      gap: 10px;
    }

    .metrics {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .metric {
      min-height: 104px;
      padding: 14px;
      display: grid;
      align-content: space-between;
      gap: 10px;
    }

    .metric b {
      font-size: 23px;
      letter-spacing: 0;
    }

    .metric span,
    .case-meta,
    .small {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .section-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 22px 0 10px;
    }

    .filter-row {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 2px 0 12px;
      scrollbar-width: none;
    }

    .filter-row::-webkit-scrollbar { display: none; }

    .chip {
      flex: 0 0 auto;
      padding: 0 12px;
      min-height: 36px;
      font-size: 13px;
    }

    .case-card {
      width: 100%;
      text-align: left;
      padding: 14px;
      display: grid;
      gap: 12px;
    }

    .case-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
    }

    .case-title {
      display: grid;
      gap: 5px;
      min-width: 0;
    }

    .case-title h3 {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .badge {
      flex: 0 0 auto;
      align-self: start;
      border-radius: 999px;
      padding: 5px 8px;
      font-size: 11px;
      font-weight: 900;
      color: #081015;
      background: var(--cyan);
    }

    .status-新接案 { background: var(--blue); }
    .status-製作中 { background: var(--yellow); }
    .status-待驗收 { background: var(--magenta); }
    .status-需修改 { background: var(--red); }
    .status-已完成 { background: var(--green); }
    .status-暫緩 { background: var(--red); }
    .status-未支出 { background: var(--yellow); }
    .status-已支出 { background: var(--green); }
    .status-不適用 { background: var(--surface-3); color: var(--soft); }

    .progress-track {
      width: 100%;
      height: 8px;
      border-radius: 99px;
      background: #06090d;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, .06);
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--cyan), var(--green));
    }

    .split {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .bottom-nav {
      position: fixed;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      width: min(100%, 430px);
      height: 76px;
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: 1fr;
      gap: 4px;
      padding: 8px 10px 12px;
      background: rgba(10, 13, 17, .92);
      border-top: 1px solid rgba(255, 255, 255, .08);
      backdrop-filter: blur(18px);
      z-index: 20;
    }

    .nav-btn {
      border-radius: 8px;
      background: transparent;
      color: var(--muted);
      display: grid;
      place-items: center;
      align-content: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 800;
      min-width: 0;
    }

    .nav-btn svg {
      width: 21px;
      height: 21px;
      stroke-width: 2.2;
    }

    .nav-btn.active {
      color: var(--text);
      background: rgba(85, 200, 232, .13);
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
      background: rgba(2, 4, 7, .72);
      backdrop-filter: blur(12px);
      align-items: flex-end;
      justify-content: center;
    }

    .modal.open {
      display: flex;
    }

    .modal-sheet {
      width: min(100%, 430px);
      max-height: 88vh;
      overflow: auto;
      background: #0c1016;
      border: 1px solid rgba(255, 255, 255, .08);
      border-radius: 8px 8px 0 0;
      padding: 16px 16px 26px;
      box-shadow: var(--shadow);
    }

    .modal-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      position: sticky;
      top: -16px;
      background: #0c1016;
      padding: 8px 0 14px;
      z-index: 2;
    }

    .icon-btn {
      width: 38px;
      min-height: 38px;
      padding: 0;
      flex: 0 0 auto;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin: 14px 0;
    }

    .detail-item {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      min-height: 68px;
      display: grid;
      align-content: space-between;
      gap: 6px;
    }

    .detail-item strong {
      font-size: 14px;
      overflow-wrap: anywhere;
    }

    .checklist {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }

    .check-item {
      min-height: 46px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
    }

    .check-item input {
      width: 20px;
      height: 20px;
      min-height: 20px;
      accent-color: var(--green);
      flex: 0 0 auto;
    }

    .money-band {
      border: 1px solid rgba(79, 209, 139, .3);
      background: rgba(79, 209, 139, .08);
      border-radius: 8px;
      padding: 12px;
      margin-top: 12px;
      display: grid;
      gap: 8px;
    }

    .split-editor {
      border: 1px solid rgba(255, 255, 255, .08);
      background: rgba(255, 255, 255, .03);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 14px;
      display: grid;
      gap: 12px;
    }

    .split-row-form {
      display: grid;
      gap: 10px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--line);
    }

    .split-row-form:last-child {
      padding-bottom: 0;
      border-bottom: 0;
    }

    .split-row-form .field {
      margin-bottom: 0;
    }

    .split-note {
      grid-column: 1 / -1;
    }

    .delivery-band {
      border: 1px solid rgba(85, 200, 232, .28);
      background: rgba(85, 200, 232, .08);
      border-radius: 8px;
      padding: 12px;
      margin-top: 12px;
      display: grid;
      gap: 10px;
    }

    .link-grid {
      display: grid;
      gap: 8px;
    }

    .link-button {
      min-height: 40px;
      padding: 9px 10px;
      border-radius: 8px;
      color: var(--text);
      background: rgba(16, 20, 26, .88);
      border: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      text-decoration: none;
      font-weight: 800;
      overflow-wrap: anywhere;
    }

    .link-button.empty {
      color: var(--muted);
      font-weight: 700;
      pointer-events: none;
    }

    .delivery-form {
      display: grid;
      gap: 10px;
      margin-top: 4px;
    }

    .review-band {
      border: 1px solid rgba(255, 111, 125, .34);
      background: rgba(255, 111, 125, .08);
      border-radius: 8px;
      padding: 12px;
      margin-top: 12px;
      display: grid;
      gap: 10px;
    }

    .form-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 8px;
    }

    .finance-row,
    .record-row,
    .expense-row,
    .pay-row {
      padding: 13px;
      display: grid;
      gap: 8px;
    }

    .receipt-thumb {
      width: 100%;
      max-height: 220px;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: var(--surface);
    }

    .pay-row {
      grid-template-columns: 1fr auto;
      align-items: center;
    }

    .hidden {
      display: none !important;
    }

    @media (min-width: 431px) {
      body {
        padding: 18px 0;
      }

      .app-shell,
      .screen {
        min-height: calc(100vh - 36px);
      }

      .app-shell {
        border-radius: 18px;
        box-shadow: var(--shadow);
      }

      .bottom-nav {
        bottom: 18px;
        border-radius: 0 0 18px 18px;
      }

      .modal {
        align-items: center;
      }

      .modal-sheet {
        border-radius: 8px;
      }
    }
  </style>
</head>
<body>
  <main class="app-shell">
    <section id="loginScreen" class="screen login-screen">
      <div class="brand">
        <div class="mark">CM</div>
        <div>
          <h1>晨嵐音樂</h1>
          <p class="muted">錄音室營運管理系統</p>
        </div>
      </div>

      <form id="loginForm" class="panel">
        <div class="field">
          <label for="username">帳號</label>
          <input id="username" type="text" autocomplete="username" placeholder="輸入帳號" required>
        </div>
        <div class="field">
          <label for="password">密碼</label>
          <input id="password" type="password" autocomplete="current-password" placeholder="輸入密碼">
        </div>
        <p id="loginError" class="error"></p>
        <button class="primary" type="submit">登入</button>
      </form>
    </section>

    <section id="appScreen" class="screen hidden">
      <header class="topbar">
        <div>
          <p id="eyebrow" class="muted">晨嵐音樂</p>
          <h2 id="pageTitle">首頁</h2>
        </div>
        <button id="logoutBtn" class="user-pill" type="button"></button>
      </header>

      <div id="viewRoot"></div>
    </section>

    <nav id="bottomNav" class="bottom-nav hidden" aria-label="主要導覽"></nav>
  </main>

  <div id="caseModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <article class="modal-sheet">
      <div class="modal-head">
        <div>
          <p id="modalCode" class="small"></p>
          <h2 id="modalTitle"></h2>
        </div>
        <button id="closeModal" class="icon-btn" type="button" aria-label="關閉">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div id="modalBody"></div>
    </article>
  </div>

  <script>
    const caseTypes = {
      "錄音": ["前製會議", "錄音 Session 1", "錄音 Session 2", "人聲剪輯", "初混確認", "交件"],
      "混音": ["素材確認", "初混版本", "客戶試聽", "修改版本", "最終確認", "交件"],
      "編曲": ["風格確認", "Demo 製作", "客戶試聽", "編曲完稿", "人聲配合", "交件"],
      "母帶": ["素材接收", "聲音分析", "母帶處理", "試聽確認", "最終版本", "交件"],
      "廣告配樂": ["廣告簡報", "風格確認", "初版配樂", "影片對位", "修改", "交件"],
      "電影配樂": ["劇本分析", "音樂風格會議", "主題曲創作", "配樂錄製", "混音", "交件"]
    };

    const workOptions = Object.keys(caseTypes);

    const state = {
      user: null,
      page: "home",
      filter: "全部",
      cases: [],
      records: [],
      expenses: [],
      users: [],
      loading: false,
      apiError: ""
    };

    const els = {
      loginScreen: document.querySelector("#loginScreen"),
      appScreen: document.querySelector("#appScreen"),
      loginForm: document.querySelector("#loginForm"),
      username: document.querySelector("#username"),
      password: document.querySelector("#password"),
      loginError: document.querySelector("#loginError"),
      logoutBtn: document.querySelector("#logoutBtn"),
      pageTitle: document.querySelector("#pageTitle"),
      eyebrow: document.querySelector("#eyebrow"),
      viewRoot: document.querySelector("#viewRoot"),
      bottomNav: document.querySelector("#bottomNav"),
      caseModal: document.querySelector("#caseModal"),
      closeModal: document.querySelector("#closeModal"),
      modalTitle: document.querySelector("#modalTitle"),
      modalCode: document.querySelector("#modalCode"),
      modalBody: document.querySelector("#modalBody")
    };

    function money(value) {
      return Number(value || 0).toLocaleString("zh-TW", {
        style: "currency",
        currency: "TWD",
        maximumFractionDigits: 0
      });
    }

    function esc(value) {
      return String(value ?? "").replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#039;"
      }[char]));
    }

    function safeUrl(value) {
      const text = String(value || "").trim();
      if (!text) return "";
      try {
        const url = new URL(text);
        return ["http:", "https:"].includes(url.protocol) ? url.toString() : "";
      } catch (_error) {
        return "";
      }
    }

    function linkButton(label, url) {
      const safe = safeUrl(url);
      if (!safe) return `<div class="link-button empty"><span>${esc(label)}</span><span>未設定</span></div>`;
      return `<a class="link-button" href="${esc(safe)}" target="_blank" rel="noopener noreferrer"><span>${esc(label)}</span><span>開啟</span></a>`;
    }

    function splitAmount(split, quote) {
      if (Number.isFinite(Number(split?.amount))) return Number(split.amount || 0);
      const value = Number(split?.value || 0);
      if (split?.method === "百分比") return Math.round(Number(quote || 0) * value / 100);
      return Math.round(value);
    }

    function caseSplitTotal(item) {
      return (item.splits || []).reduce((sum, split) => sum + splitAmount(split, item.quote), 0);
    }

    function caseProfit(item) {
      return Number(item.quote || 0) - Number(item.cost || 0) - caseSplitTotal(item);
    }

    function aliasesForCurrentUser() {
      if (!state.user) return [];
      return [state.user.employee, state.user.label, state.user.email, state.user.role].filter(Boolean);
    }

    function splitRowsForUser(item) {
      if (state.user?.isBoss) return item.splits || [];
      const aliases = aliasesForCurrentUser();
      return (item.splits || []).filter(split => aliases.includes(split.employee));
    }

    function splitMethodLabel(split) {
      return split.method === "百分比" ? `${Number(split.value || 0)}%` : money(split.value);
    }

    async function api(path, options = {}) {
      const response = await fetch(path, {
        headers: { "Content-Type": "application/json", ...(options.headers || {}) },
        ...options
      });
      if (!response.ok) {
        let message = "資料庫連線或伺服器發生錯誤。";
        try {
          const body = await response.json();
          if (body.error) message = body.error;
        } catch (_error) {}
        throw new Error(message);
      }
      return response.status === 204 ? null : response.json();
    }

    async function refreshCases() {
      state.loading = true;
      state.apiError = "";
      renderApp();
      try {
        const [cases, records, expenses] = await Promise.all([
          api("/api/cases"),
          state.user.isBoss ? api("/api/company-records") : Promise.resolve([]),
          api(`/api/expense-claims?requesterId=${state.user.id}`)
        ]);
        state.cases = cases;
        state.records = records;
        state.expenses = expenses;
        if (state.user.isBoss) state.users = await api(`/api/users?requesterId=${state.user.id}`);
      } catch (error) {
        state.apiError = error.message;
        state.cases = [];
        state.records = [];
        state.expenses = [];
        state.users = [];
      } finally {
        state.loading = false;
        renderApp();
      }
    }

    function visibleCases() {
      if (!state.user) return [];
      if (state.user.isBoss) return state.cases;
      const aliases = aliasesForCurrentUser();
      return state.cases.filter(item =>
        aliases.includes(item.owner) ||
        (item.splits || []).some(split => aliases.includes(split.employee))
      );
    }

    function progressOf(item) {
      if (!item.checklist.length) return 0;
      return Math.round(item.checklist.filter(Boolean).length / item.checklist.length * 100);
    }

    function deliveryText(item) {
      if (item.status === "需修改") return "老闆要求修改";
      if (item.deliveryUrl) return "已提供交付連結";
      if (item.driveFolderUrl || item.sourceMaterialUrl) return "已有雲端資料夾";
      return "未設定交付位置";
    }

    function statusOptions(currentStatus) {
      const normal = ["新接案", "製作中", "待驗收", "已完成", "暫緩"];
      const options = state.user.isBoss ? ["新接案", "製作中", "待驗收", "需修改", "已完成", "暫緩"] : normal;
      if (!options.includes(currentStatus)) options.splice(3, 0, currentStatus);
      return options;
    }

    async function login(event) {
      event.preventDefault();
      let account;
      try {
        account = await api("/api/login", {
          method: "POST",
          body: JSON.stringify({
            email: els.username.value.trim().toLowerCase(),
            password: els.password.value
          })
        });
      } catch (error) {
        els.loginError.textContent = error.message;
        return;
      }
      state.user = account;
      state.page = "home";
      els.loginError.textContent = "";
      els.username.value = "";
      els.password.value = "";
      els.loginScreen.classList.add("hidden");
      els.appScreen.classList.remove("hidden");
      els.bottomNav.classList.remove("hidden");
      await refreshCases();

    function stats(items = visibleCases()) {
      return {
        total: items.reduce((sum, item) => sum + Number(item.quote || 0), 0),
        ongoing: items.filter(item => item.status === "製作中").length,
        review: items.filter(item => item.status === "待驗收").length,
        done: items.filter(item => item.status === "已完成").length,
        count: items.length
      };
    }

    function payrollFor(name) {
      const employee = employeeList().find(item => item.name === name);
      const aliases = [name, employee?.email, employee?.label, employee?.role].filter(Boolean);
      const doneCases = state.cases.filter(item =>
        item.status === "已完成" &&
        ((item.splits || []).some(split => aliases.includes(split.employee)) || aliases.includes(item.owner))
      );
      const revenue = doneCases.reduce((sum, item) => sum + Number(item.quote || 0), 0);
      const splitPay = doneCases.reduce((sum, item) => {
        return sum + (item.splits || [])
          .filter(split => aliases.includes(split.employee))
          .reduce((splitSum, split) => splitSum + splitAmount(split, item.quote), 0);
      }, 0);
      return {
        base: employee?.base || 0,
        bonus: splitPay,
        total: (employee?.base || 0) + splitPay,
        cases: state.cases.filter(item =>
          aliases.includes(item.owner) || (item.splits || []).some(split => aliases.includes(split.employee))
        ).length,
        revenue
      };
    }

    function employeeList() {
      return state.users
        .filter(user => !user.isBoss)
        .map(user => ({
          name: user.label,
          email: user.email,
          label: user.label,
          role: user.role,
          workTypes: user.workTypes || [],
          base: Number(user.baseSalary || 0),
          bonusRate: 0
        }));
    }

    function monthlyPettyCash() {
      const month = new Date().toISOString().slice(0, 7);

    async function createCase(event) {
      event.preventDefault();
      const type = document.querySelector("#caseType").value;
      const splits = [...document.querySelectorAll("[data-split-row]")]
        .map(row => ({
          employee: row.querySelector("[data-split-employee]").value,
          workType: row.querySelector("[data-split-work-type]").value,
          method: row.querySelector("[data-split-method]").value,
          value: Number(row.querySelector("[data-split-value]").value || 0),
          note: row.querySelector("[data-split-note]").value.trim()
        }))
        .filter(split => split.employee && split.value > 0);
      const payload = {
        name: document.querySelector("#caseName").value.trim(),
        type,
        client: document.querySelector("#client").value.trim(),
        owner: document.querySelector("#owner").value,
        start: document.querySelector("#start").value,
        due: document.querySelector("#due").value,
        quote: state.user.isBoss ? Number(document.querySelector("#quote").value || 0) : 0,
        cost: state.user.isBoss ? Number(document.querySelector("#cost").value || 0) : 0,
        status: document.querySelector("#status").value,
        role: state.user.isBoss ? "owner" : "staff",
        notes: document.querySelector("#notes").value.trim(),
        driveFolderUrl: document.querySelector("#driveFolderUrl").value.trim(),
        sourceMaterialUrl: document.querySelector("#sourceMaterialUrl").value.trim(),
        splits
      };
      const item = await api("/api/cases", { method: "POST", body: JSON.stringify(payload) });
      state.cases.unshift(item);
      state.page = "cases";
      state.filter = "全部";
      renderApp();
      openCase(item.id);
    }

    function imageFileToDataUrl(file) {
      return new Promise((resolve, reject) => {
        if (!file) {
          reject(new Error("請上傳發票照片"));
          return;
        }
        const img = new Image();
        const reader = new FileReader();
        reader.onerror = () => reject(new Error("發票照片讀取失敗"));
        reader.onload = () => {
          img.onerror = () => reject(new Error("發票照片格式不正確"));
          img.onload = () => {
            const maxSide = 1200;
            const scale = Math.min(1, maxSide / Math.max(img.width, img.height));
            const canvas = document.createElement("canvas");
            canvas.width = Math.max(1, Math.round(img.width * scale));
            canvas.height = Math.max(1, Math.round(img.height * scale));
            const ctx = canvas.getContext("2d");
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            resolve(canvas.toDataURL("image/jpeg", 0.74));
          };
          img.src = reader.result;
        };
        reader.readAsDataURL(file);
      });
    }

      const receivable = state.cases.filter(item => item.status === "待驗收").reduce((sum, item) => sum + item.quote, 0);

      const pendingCash = pendingPettyCash();
      els.viewRoot.innerHTML = `
        <div class="grid metrics">
          <div class="metric"><span>本月總案件金額</span><b>${money(total)}</b></div>
          <div class="metric"><span>已完成收款</span><b>${money(paid)}</b></div>
          <div class="metric"><span>待收款</span><b>${money(receivable)}</b></div>
          <div class="metric"><span>進行中總金額</span><b>${money(active)}</b></div>
          <div class="metric"><span>零用金支出</span><b>${money(pettyCash)}</b></div>
          <div class="metric"><span>未支出零用金</span><b>${money(pendingCash)}</b></div>

        <div class="section-title"><h3>薪資支出</h3><strong>${money(salary)}</strong></div>

              <div><h3>${employee.name}</h3><p class="small">底薪 ${money(pay.base)} · 獎金 ${money(pay.bonus)}</p></div>
              <strong>${money(pay.total)}</strong>

          }).join("")}

        <div class="section-title"><h3>案件金額一覽</h3></div>
        <div class="grid">
          ${state.cases.length ? state.cases.map(item => `<div class="finance-row">
            <div class="split"><h3>${esc(item.name)}</h3><span class="badge status-${esc(item.status)}">${esc(item.status)}</span></div>
            <p class="small">${esc(item.id)} · ${esc(item.client)} · ${esc(item.owner)}</p>
            <p class="small">${esc(deliveryText(item))}</p>
            <div class="split"><span>報價</span><strong>${money(item.quote)}</strong></div>
            <div class="split"><span>預估成本</span><strong>${money(item.cost)}</strong></div>
            <div class="split"><span>分潤支出</span><strong>${money(caseSplitTotal(item))}</strong></div>
            <div class="split"><span>預估利潤</span><strong>${money(caseProfit(item))}</strong></div>
            ${(item.splits || []).length ? `<p class="small">拆帳：${item.splits.map(split => `${esc(split.employee)} ${esc(split.workType)} ${esc(splitMethodLabel(split))}`).join(" · ")}</p>` : `<p class="small">尚未設定拆帳</p>`}

    function renderSplitSummary(item) {

      return rows.map(split => `
        <div class="split">
          <span>${esc(split.employee)} · ${esc(split.workType)} · ${esc(split.method)}</span>
          <strong>${money(splitAmount(split, item.quote))}</strong>

    function openCase(id) {

      const sourceMaterialUrl = safeUrl(item.sourceMaterialUrl);

      els.modalTitle.textContent = item.name;
      els.modalBody.innerHTML = `
        <div class="detail-grid">
          <div class="detail-item"><span class="small">客戶</span><strong>${esc(item.client)}</strong></div>
          <div class="detail-item"><span class="small">負責人</span><strong>${esc(item.owner)}</strong></div>
          <div class="detail-item"><span class="small">開始日期</span><strong>${esc(item.start)}</strong></div>
          <div class="detail-item"><span class="small">截止日期</span><strong>${esc(item.due)}</strong></div>
        </div>

          <label for="modalStatus">案件狀態</label>
          <select id="modalStatus" data-status-for="${item.id}">
            ${statusOptions(item.status).map(status => `<option ${status === item.status ? "selected" : ""}>${status}</option>`).join("")}
          </select>
        </div>
        <div>
          <div class="split"><h3>製作 Checklist</h3><strong>${progressOf(item)}%</strong></div>
          <div class="progress-track"><div class="progress-fill" style="width:${progressOf(item)}%"></div></div>

            ${caseTypes[item.type].map((label, index) => `

                <span>${esc(label)}</span>

        </div>
        <div class="delivery-band">
          <div class="split">
            <h3>Google Drive 交付區</h3>
            <span class="small">${esc(deliveryText(item))}</span>
          </div>
          <div class="link-grid">
            ${linkButton("工作資料夾", driveFolderUrl)}
            ${linkButton("客戶素材", sourceMaterialUrl)}
            ${linkButton("最終交付", deliveryUrl)}

          <form id="deliveryForm" class="delivery-form" data-delivery-for="${esc(item.id)}">

            <div class="field"><label for="modalSourceMaterialUrl">客戶素材</label><input id="modalSourceMaterialUrl" type="url" inputmode="url" value="${esc(sourceMaterialUrl)}" placeholder="客戶素材或上傳資料夾"></div>
            <div class="field"><label for="modalDeliveryUrl">最終交付</label><input id="modalDeliveryUrl" type="url" inputmode="url" value="${esc(deliveryUrl)}" placeholder="最後交給客戶的 Google Drive 連結"></div>
            <div class="field"><label for="modalDeliveryNotes">交付備註</label><textarea id="modalDeliveryNotes" placeholder="版本、檔案格式、交付注意事項">${esc(item.deliveryNotes || "")}</textarea></div>
            <button class="primary" type="submit">儲存交付資訊</button>
          </form>
        </div>
        <div class="review-band">
          <div class="split">
            <h3>驗收建議</h3>
            <span class="small">${item.status === "需修改" ? "需修改" : "尚未打回"}</span>
          </div>
          <p class="muted">${esc(item.reviewNotes || "目前沒有驗收建議。")}</p>
          <form id="reviewForm" class="${state.user.isBoss ? "delivery-form" : "hidden"}" data-review-for="${esc(item.id)}">
            <div class="field"><label for="modalReviewNotes">老闆建議</label><textarea id="modalReviewNotes" placeholder="寫下哪裡不 OK、要怎麼修、交回版本規格">${esc(item.reviewNotes || "")}</textarea></div>
            <button class="primary" type="submit">標記需修改</button>
          </form>
        </div>
        <div class="${canSeeMoney ? "money-band" : "hidden"}">
          <div class="split"><span>報價金額</span><strong>${money(item.quote)}</strong></div>
          <div class="split"><span>預估成本</span><strong>${money(item.cost)}</strong></div>
          <div class="split"><span>分潤支出</span><strong>${money(caseSplitTotal(item))}</strong></div>
          <div class="split"><span>預估利潤</span><strong>${money(caseProfit(item))}</strong></div>
          <div class="section-title"><h3>拆帳明細</h3></div>
          ${renderSplitSummary(item)}
        </div>
        <div class="${!canSeeMoney && ownSplits.length ? "money-band" : "hidden"}">
          <div class="split"><h3>我的分潤</h3><strong>${money(ownSplits.reduce((sum, split) => sum + splitAmount(split, item.quote), 0))}</strong></div>
          ${renderSplitSummary(item)}
        </div>
        <div class="section-title"><h3>備註 / 需求</h3></div>
        <form id="caseNotesForm" class="${canSeeMoney ? "delivery-form" : "hidden"}" data-notes-for="${esc(item.id)}">
          <div class="field"><label for="modalCaseNotes">案件備註</label><textarea id="modalCaseNotes" placeholder="客戶需求、參考資料、交付格式">${esc(item.notes || "")}</textarea></div>
          <button class="primary" type="submit">儲存案件備註</button>
        </form>
        <p class="${canSeeMoney ? "hidden" : "muted"}">${esc(item.notes || "無備註")}</p>
        <div class="form-actions">
          <button class="ghost" type="button" data-delete="${item.id}">刪除</button>
          <button class="primary" type="button" data-close-modal>完成</button>
        </div>
      `;
      els.caseModal.classList.add("open");
    }

    function closeModal() {
      els.caseModal.classList.remove("open");
    }

    async function updateChecklist(id, index, checked) {
      const item = await api(`/api/cases/${id}/checklist`, {
        method: "PATCH",
        body: JSON.stringify({ index, checked })
      });
      state.cases = state.cases.map(entry => entry.id === id ? item : entry);
      openCase(id);
      renderApp();
    }

    async function updateStatus(id, status) {
      const item = await api(`/api/cases/${id}/status`, {
        method: "PATCH",
        body: JSON.stringify({ status, role: state.user.isBoss ? "owner" : "staff" })
      });
      state.cases = state.cases.map(entry => entry.id === id ? item : entry);
      renderApp();
    }

    async function updateReview(event) {
      event.preventDefault();
      const id = event.target.dataset.reviewFor;
      const item = await api(`/api/cases/${id}/review`, {
        method: "PATCH",
        body: JSON.stringify({
          role: state.user.isBoss ? "owner" : "staff",
          reviewNotes: document.querySelector("#modalReviewNotes").value.trim()
        })
      });
      state.cases = state.cases.map(entry => entry.id === id ? item : entry);
      renderApp();
      openCase(id);
    }

    async function updateCaseNotes(event) {
      event.preventDefault();
      const id = event.target.dataset.notesFor;
      const item = await api(`/api/cases/${id}/notes`, {
        method: "PATCH",
        body: JSON.stringify({
          role: state.user.isBoss ? "owner" : "staff",
          notes: document.querySelector("#modalCaseNotes").value.trim()
        })
      });
      state.cases = state.cases.map(entry => entry.id === id ? item : entry);
      renderApp();
      openCase(id);
    }

    async function updateDelivery(event) {
      event.preventDefault();
      const id = event.target.dataset.deliveryFor;
      const item = await api(`/api/cases/${id}/delivery`, {
        method: "PATCH",
        body: JSON.stringify({
          driveFolderUrl: document.querySelector("#modalDriveFolderUrl").value.trim(),
          sourceMaterialUrl: document.querySelector("#modalSourceMaterialUrl").value.trim(),
          deliveryUrl: document.querySelector("#modalDeliveryUrl").value.trim(),
          deliveryNotes: document.querySelector("#modalDeliveryNotes").value.trim()
        })
      });
      state.cases = state.cases.map(entry => entry.id === id ? item : entry);
      renderApp();
      openCase(id);
    }

    async function deleteCase(id) {
      await api(`/api/cases/${id}`, { method: "DELETE" });
      state.cases = state.cases.filter(item => item.id !== id);
      closeModal();
      renderApp();
    }

    document.addEventListener("click", event => {
      const pageBtn = event.target.closest("[data-page]");
      if (pageBtn) {
        state.page = pageBtn.dataset.page;
        renderApp();
      }

      const filterBtn = event.target.closest("[data-filter]");
      if (filterBtn) {
        state.filter = filterBtn.dataset.filter;
        renderCases();
      }

      const caseBtn = event.target.closest("[data-case]");
      if (caseBtn) openCase(caseBtn.dataset.case);

      const closeBtn = event.target.closest("[data-close-modal]");
      if (closeBtn) closeModal();

      const deleteBtn = event.target.closest("[data-delete]");
      if (deleteBtn && confirm("這會從 Zeabur 資料庫刪除此案件，確定刪除？")) {
        deleteCase(deleteBtn.dataset.delete).catch(error => alert(error.message));
      }

      const deleteRecordBtn = event.target.closest("[data-delete-record]");
      if (deleteRecordBtn && confirm("這會從 Zeabur 資料庫刪除此行政紀錄，確定刪除？")) {
        deleteCompanyRecord(deleteRecordBtn.dataset.deleteRecord).catch(error => alert(error.message));
      }
    });

    document.addEventListener("change", event => {
      if (event.target.matches("[data-check]")) {
        updateChecklist(event.target.dataset.check, Number(event.target.dataset.index), event.target.checked).catch(error => alert(error.message));
      }
      if (event.target.matches("[data-status-for]")) {
        updateStatus(event.target.dataset.statusFor, event.target.value).catch(error => alert(error.message));
      }
    });

    els.loginForm.addEventListener("submit", login);
    els.logoutBtn.addEventListener("click", logout);
    els.closeModal.addEventListener("click", closeModal);
    els.caseModal.addEventListener("click", event => {
      if (event.target === els.caseModal) closeModal();
    });
    document.addEventListener("submit", event => {
      if (event.target.id === "caseForm") createCase(event).catch(error => alert(error.message));
      if (event.target.id === "companyRecordForm") createCompanyRecord(event).catch(error => alert(error.message));
      if (event.target.id === "userForm") createUser(event).catch(error => alert(error.message));
      if (event.target.matches("[data-base-salary-for]")) updateEmployeeBaseSalary(event).catch(error => alert(error.message));
      if (event.target.matches("[data-reset-password-for]")) resetEmployeePassword(event).catch(error => alert(error.message));
      if (event.target.id === "workTypesForm") updateWorkTypes(event).catch(error => alert(error.message));
      if (event.target.id === "passwordForm") updateMyPassword(event).catch(error => alert(error.message));
      if (event.target.id === "expenseForm") createExpense(event).catch(error => alert(error.message));
      if (event.target.id === "reviewForm") updateReview(event).catch(error => alert(error.message));
      if (event.target.id === "caseNotesForm") updateCaseNotes(event).catch(error => alert(error.message));
      if (event.target.id === "deliveryForm") updateDelivery(event).catch(error => alert(error.message));
    });

  </script>
</body>
