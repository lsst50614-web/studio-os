<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>晨嵐音樂</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #080a0d;
      --surface: #10141a;
      --surface-2: #151b23;
      --surface-3: #1d2530;
      --line: #27313f;
      --muted: #8b98a8;
      --text: #eef3f8;
      --soft: #c9d3df;
      --green: #4fd18b;
      --yellow: #f2bd58;
      --red: #ff6f7d;
      --cyan: #55c8e8;
      --blue: #7798ff;
      --magenta: #d679ff;
      --shadow: 0 18px 60px rgba(0, 0, 0, .38);
      --radius: 8px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(85, 200, 232, .14), transparent 28rem),
        linear-gradient(160deg, #080a0d 0%, #0d1116 48%, #090b0f 100%);
      color: var(--text);
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app-shell {
      width: min(100%, 430px);
      min-height: 100vh;
      margin: 0 auto;
      background: rgba(8, 10, 13, .72);
      border-left: 1px solid rgba(255, 255, 255, .05);
      border-right: 1px solid rgba(255, 255, 255, .05);
      position: relative;
      overflow: hidden;
    }

    .screen {
      min-height: 100vh;
      padding: 22px 18px 96px;
    }

    .login-screen {
      display: grid;
      align-content: center;
      gap: 18px;
      padding-bottom: 22px;
    }

    .brand {
      display: grid;
      gap: 12px;
      margin-bottom: 6px;
    }

    .mark {
      width: 56px;
      height: 56px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--cyan), var(--magenta));
      color: #071015;
      font-weight: 900;
      letter-spacing: 0;
      box-shadow: 0 14px 40px rgba(85, 200, 232, .24);
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    h1 {
      font-size: 36px;
      line-height: 1.05;
      letter-spacing: 0;
    }

    h2 {
      font-size: 24px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    h3 {
      font-size: 16px;
      line-height: 1.3;
      letter-spacing: 0;
    }

    .muted {
      color: var(--muted);
      line-height: 1.55;
    }

    .panel,
    .case-card,
    .metric,
    .finance-row,
    .record-row,
    .expense-row,
    .pay-row {
      background: linear-gradient(180deg, rgba(21, 27, 35, .96), rgba(16, 20, 26, .96));
      border: 1px solid rgba(255, 255, 255, .07);
      border-radius: var(--radius);
      box-shadow: 0 10px 30px rgba(0, 0, 0, .18);
    }

    .panel {
      padding: 16px;
    }

    .field {
      display: grid;
      gap: 8px;
      margin-bottom: 14px;
    }

    label {
      color: var(--soft);
      font-size: 13px;
      font-weight: 700;
    }

    input,
    select,
    textarea {
      width: 100%;
      min-height: 46px;
      color: var(--text);
      background: #0b0f14;
      border: 1px solid var(--line);
      border-radius: 8px;
      outline: 0;
      padding: 11px 12px;
    }

    textarea {
      min-height: 92px;
      resize: vertical;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 0 3px rgba(85, 200, 232, .14);
    }

    .chip,
    .icon-btn,
    .primary,
    .ghost {
      min-height: 42px;
      border-radius: 8px;
      color: var(--text);
      border: 1px solid var(--line);
      background: var(--surface-2);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-weight: 800;
    }

    .chip.active {
      border-color: rgba(85, 200, 232, .8);
      background: rgba(85, 200, 232, .14);
      color: #dff8ff;
    }

    .primary {
      width: 100%;
      background: linear-gradient(135deg, var(--cyan), var(--green));
      color: #061014;
      border: 0;
      min-height: 48px;
      text-decoration: none;
    }

    .ghost {
      background: transparent;
      min-height: 38px;
      padding: 0 12px;
    }

    .compact-action {
      min-height: 32px;
      padding: 0 10px;
      font-size: 12px;
      white-space: nowrap;
    }

    .error {
      color: var(--red);
      min-height: 20px;
      font-size: 13px;
      font-weight: 700;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 18px;
    }

    .user-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 7px 10px;
      color: var(--soft);
      background: rgba(16, 20, 26, .78);
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .grid {
      display: grid;
      gap: 10px;
    }

    .metrics {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .metric {
      min-height: 104px;
      padding: 14px;
      display: grid;
      align-content: space-between;
      gap: 10px;
    }

    .metric b {
      font-size: 23px;
      letter-spacing: 0;
    }

    .metric span,
    .case-meta,
    .small {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .section-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 22px 0 10px;
    }

    .filter-row {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 2px 0 12px;
      scrollbar-width: none;
    }

    .filter-row::-webkit-scrollbar { display: none; }

    .chip {
      flex: 0 0 auto;
      padding: 0 12px;
      min-height: 36px;
      font-size: 13px;
    }

    .case-card {
      width: 100%;
      text-align: left;
      padding: 14px;
      display: grid;
      gap: 12px;
    }

    .case-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
    }

    .case-title {
      display: grid;
      gap: 5px;
      min-width: 0;
    }

    .case-title h3 {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .badge {
      flex: 0 0 auto;
      align-self: start;
      border-radius: 999px;
      padding: 5px 8px;
      font-size: 11px;
      font-weight: 900;
      color: #081015;
      background: var(--cyan);
    }

    .status-新接案 { background: var(--blue); }
    .status-製作中 { background: var(--yellow); }
    .status-待驗收 { background: var(--magenta); }
    .status-需修改 { background: var(--red); }
    .status-已完成 { background: var(--green); }
    .status-暫緩 { background: var(--red); }
    .status-未支出 { background: var(--yellow); }
    .status-已支出 { background: var(--green); }
    .status-不適用 { background: var(--surface-3); color: var(--soft); }

    .progress-track {
      width: 100%;
      height: 8px;
      border-radius: 99px;
      background: #06090d;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, .06);
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--cyan), var(--green));
    }

    .split {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .bottom-nav {
      position: fixed;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      width: min(100%, 430px);
      height: 76px;
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: 1fr;
      gap: 4px;
      padding: 8px 10px 12px;
      background: rgba(10, 13, 17, .92);
      border-top: 1px solid rgba(255, 255, 255, .08);
      backdrop-filter: blur(18px);
      z-index: 20;
    }

    .nav-btn {
      border-radius: 8px;
      background: transparent;
      color: var(--muted);
      display: grid;
      place-items: center;
      align-content: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 800;
      min-width: 0;
    }

    .nav-btn svg {
      width: 21px;
      height: 21px;
      stroke-width: 2.2;
    }

    .nav-btn.active {
      color: var(--text);
      background: rgba(85, 200, 232, .13);
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
      background: rgba(2, 4, 7, .72);
      backdrop-filter: blur(12px);
      align-items: flex-end;
      justify-content: center;
    }

    .modal.open {
      display: flex;
    }

    .modal-sheet {
      width: min(100%, 430px);
      max-height: 88vh;
      overflow: auto;
      background: #0c1016;
      border: 1px solid rgba(255, 255, 255, .08);
      border-radius: 8px 8px 0 0;
      padding: 16px 16px 26px;
      box-shadow: var(--shadow);
    }

    .modal-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      position: sticky;
      top: -16px;
      background: #0c1016;
      padding: 8px 0 14px;
      z-index: 2;
    }

    .icon-btn {
      width: 38px;
      min-height: 38px;
      padding: 0;
      flex: 0 0 auto;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin: 14px 0;
    }

    .detail-item {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      min-height: 68px;
      display: grid;
      align-content: space-between;
      gap: 6px;
    }

    .detail-item strong {
      font-size: 14px;
      overflow-wrap: anywhere;
    }

    .checklist {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }

    .split-work-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
    }

    .check-item {
      min-height: 46px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
    }

    .split-work-grid .check-item {
      min-height: 36px;
      padding: 7px 8px;
      gap: 7px;
      font-size: 12px;
      line-height: 1.25;
    }

    .split-work-grid .check-item input {
      width: 16px;
      height: 16px;
      min-height: 16px;
    }

    .check-item input {
      width: 20px;
      height: 20px;
      min-height: 20px;
      accent-color: var(--green);
      flex: 0 0 auto;
    }

    .money-band {
      border: 1px solid rgba(79, 209, 139, .3);
      background: rgba(79, 209, 139, .08);
      border-radius: 8px;
      padding: 12px;
      margin-top: 12px;
      display: grid;
      gap: 8px;
    }

    .foldout {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(16, 20, 26, .45);
      overflow: hidden;
    }

    .foldout summary {
      min-height: 44px;
      padding: 10px 12px;
      cursor: pointer;
      list-style: none;
    }

    .foldout summary::-webkit-details-marker {
      display: none;
    }

    .foldout summary::after {
      content: "展開";
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .foldout[open] summary::after {
      content: "收起";
    }

    .foldout-body {
      padding: 0 12px 12px;
      display: grid;
      gap: 10px;
    }

    .split-editor {
      border: 1px solid rgba(255, 255, 255, .08);
      background: rgba(255, 255, 255, .03);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 14px;
      display: grid;
      gap: 12px;
    }

    .split-rows {
      display: grid;
      gap: 12px;
    }

    .split-row-form {
      display: grid;
      gap: 10px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--line);
    }

    .split-row-form:last-child {
      padding-bottom: 0;
      border-bottom: 0;
    }

    .split-row-form .field {
      margin-bottom: 0;
    }

    .split-note {
      grid-column: 1 / -1;
    }

    .rental-panel {
      border: 1px solid rgba(85, 200, 232, .24);
      background: rgba(85, 200, 232, .06);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 14px;
    }

    .delivery-band {
      border: 1px solid rgba(85, 200, 232, .28);
      background: rgba(85, 200, 232, .08);
      border-radius: 8px;
      padding: 12px;
      margin-top: 12px;
      display: grid;
      gap: 10px;
    }

    .link-grid {
      display: grid;
      gap: 8px;
    }

    .link-button {
      min-height: 40px;
      padding: 9px 10px;
      border-radius: 8px;
      color: var(--text);
      background: rgba(16, 20, 26, .88);
      border: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      text-decoration: none;
      font-weight: 800;
      overflow-wrap: anywhere;
    }

    .link-button.empty {
      color: var(--muted);
      font-weight: 700;
      pointer-events: none;
    }

    .delivery-form {
      display: grid;
      gap: 10px;
      margin-top: 4px;
    }

    .review-band {
      border: 1px solid rgba(85, 200, 232, .24);
      background: rgba(85, 200, 232, .06);
      border-radius: 8px;
      padding: 12px;
      margin-top: 12px;
      display: grid;
      gap: 10px;
    }

    .review-band.pending {
      border-color: rgba(79, 209, 139, .28);
      background: rgba(79, 209, 139, .07);
    }

    .review-band.rejected {
      border: 1px solid rgba(255, 111, 125, .34);
      background: rgba(255, 111, 125, .08);
    }

    .review-band.done {
      border-color: rgba(127, 145, 165, .28);
      background: rgba(127, 145, 165, .06);
    }

    .form-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 8px;
    }

    .finance-row,
    .record-row,
    .expense-row,
    .pay-row {
      padding: 13px;
      display: grid;
      gap: 8px;
    }

    .revenue-row {
      padding: 10px;
      gap: 7px;
    }

    .revenue-head h3 {
      font-size: 14px;
    }

    .revenue-money {
      display: flex;
      flex-wrap: wrap;
      gap: 5px 12px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .revenue-money strong {
      color: var(--text);
    }

    .revenue-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .revenue-actions .ghost {
      min-height: 32px;
      font-size: 12px;
    }

    .revenue-editor {
      border-top: 1px solid var(--line);
      padding-top: 10px;
      margin-top: 2px;
    }

    .receipt-thumb {
      width: 100%;
      max-height: 220px;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: var(--surface);
    }

    .pay-row {
      grid-template-columns: 1fr auto;
      align-items: center;
    }

    .hidden {
      display: none !important;
    }

    @media (min-width: 431px) {
      body {
        padding: 18px 0;
      }

      .app-shell,
      .screen {
        min-height: calc(100vh - 36px);
      }

      .app-shell {
        border-radius: 18px;
        box-shadow: var(--shadow);
      }

      .bottom-nav {
        bottom: 18px;
        border-radius: 0 0 18px 18px;
      }

      .modal {
        align-items: center;
      }

      .modal-sheet {
        border-radius: 8px;
      }
    }
  </style>
</head>
<body>
  <main class="app-shell">
    <section id="loginScreen" class="screen login-screen">
      <div class="brand">
        <div class="mark">CM</div>
        <div>
          <h1>晨嵐音樂</h1>
          <p class="muted">錄音室營運管理系統</p>
        </div>
      </div>

      <form id="loginForm" class="panel">
        <div class="field">
          <label for="username">帳號</label>
          <input id="username" type="text" autocomplete="username" placeholder="輸入帳號" required>
        </div>
        <div class="field">
          <label for="password">密碼</label>
          <input id="password" type="password" autocomplete="current-password" placeholder="輸入密碼">
        </div>
        <p id="loginError" class="error"></p>
        <button class="primary" type="submit">登入</button>
      </form>
    </section>

    <section id="appScreen" class="screen hidden">
      <header class="topbar">
        <div>
          <p id="eyebrow" class="muted">晨嵐音樂</p>
          <h2 id="pageTitle">首頁</h2>
        </div>
        <button id="logoutBtn" class="user-pill" type="button"></button>
      </header>

      <div id="viewRoot"></div>
    </section>

    <nav id="bottomNav" class="bottom-nav hidden" aria-label="主要導覽"></nav>
  </main>

  <div id="caseModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <article class="modal-sheet">
      <div class="modal-head">
        <div>
          <p id="modalCode" class="small"></p>
          <h2 id="modalTitle"></h2>
        </div>
        <button id="closeModal" class="icon-btn" type="button" aria-label="關閉">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div id="modalBody"></div>
    </article>
  </div>

  <script>
    const caseTypes = {
      "錄音": ["前製會議", "錄音 Session 1", "錄音 Session 2", "人聲剪輯", "初混確認", "交件"],
      "混音": ["素材確認", "初混版本", "客戶試聽", "修改版本", "最終確認", "交件"],
      "編曲": ["風格確認", "Demo 製作", "客戶試聽", "編曲完稿", "人聲配合", "交件"],
      "包案製作": ["需求確認", "前製安排", "錄音 / 製作", "混音 / 修正", "客戶確認", "交件"],
      "寫詞": ["需求確認", "歌詞初稿", "修改確認", "歌詞定稿", "交件"],
      "寫曲": ["需求確認", "旋律 Demo", "修改確認", "曲稿定稿", "交件"],
      "DEMO 演唱": ["Key / 音域確認", "Demo 錄音", "人聲整理", "試聽確認", "交件"],
      "母帶": ["素材接收", "聲音分析", "母帶處理", "試聽確認", "最終版本", "交件"],
      "廣告配樂": ["廣告簡報", "風格確認", "初版配樂", "影片對位", "修改", "交件"],
      "電影配樂": ["劇本分析", "音樂風格會議", "主題曲創作", "配樂錄製", "混音", "交件"],
      "非員工錄音室租借": ["時段確認", "設備確認", "進場", "使用完成", "場地復原", "結案"],
      "Podcast 錄音": ["錄音時段確認", "設備與麥克風確認", "錄音 Session", "檔案備份", "初步檢查", "交件"],
      "Podcast 單集製作": ["錄音完成", "素材備份", "剪輯中", "剪輯完成", "已交付", "已列入月結"],
      "員工錄音室租借": ["時段確認", "設備確認", "錄音使用", "檔案整理", "場地復原", "結案"],
      "歌唱課": ["學生需求確認", "上課時段確認", "歌唱課執行", "課後建議", "費用確認", "結案"],
      "編曲課": ["學生需求確認", "上課時段確認", "編曲課執行", "作業 / 檔案確認", "費用確認", "結案"]
    };

    const caseTypeAliases = {
      "Podcast 剪輯": "Podcast 單集製作",
      "Podcast 月結剪輯": "Podcast 單集製作"
    };
    const workOptions = Object.keys(caseTypes);
    const staffSelfWorkOptions = ["員工錄音室租借", "歌唱課", "編曲課"];
    const podcastSingleType = "Podcast 單集製作";
    const podcastDefaultEditFee = 800;
    const defaultStudioExpenseModel = {
      startMonth: "2019-02",
      endMonth: "2026-05",
      totalMonths: 88,
      splitRatio: { gary: 0.5, partner: 0.5 },
      monthlyExpenses: [
        { name: "房租", amount: 12000, type: "fixed", cycle: "monthly" },
        { name: "電費", amount: 788, type: "fixed", cycle: "monthly_average" },
        { name: "網路", amount: 1360, type: "fixed", cycle: "monthly" },
        { name: "營業稅", amount: 1559, type: "fixed", cycle: "monthly_average" },
        { name: "雜項", amount: 1040, type: "variable_average", cycle: "monthly_average" }
      ],
      oneTimeCosts: [
        { name: "裝潢與工作室建置", amount: 2800000, type: "capital_expense" }
      ]
    };

    const state = {
      user: null,
      page: "home",
      filter: "全部",
      cases: [],
      records: [],
      expenses: [],
      payments: [],
      historicalRevenues: [],
      users: [],
      studioExpenseModel: defaultStudioExpenseModel,
      revenueQuery: "",
      revenueStatus: "all",
      revenueListOpen: false,
      revenueVisibleCount: 8,
      editingRevenueId: null,
      loading: false,
      apiError: ""
    };

    const sessionKey = "studio-os-session-user";
    let revenueSearchComposing = false;
    let revenueSearchTimer = null;

    const els = {
      loginScreen: document.querySelector("#loginScreen"),
      appScreen: document.querySelector("#appScreen"),
      loginForm: document.querySelector("#loginForm"),
      username: document.querySelector("#username"),
      password: document.querySelector("#password"),
      loginError: document.querySelector("#loginError"),
      logoutBtn: document.querySelector("#logoutBtn"),
      pageTitle: document.querySelector("#pageTitle"),
      eyebrow: document.querySelector("#eyebrow"),
      viewRoot: document.querySelector("#viewRoot"),
      bottomNav: document.querySelector("#bottomNav"),
      caseModal: document.querySelector("#caseModal"),
      closeModal: document.querySelector("#closeModal"),
      modalTitle: document.querySelector("#modalTitle"),
      modalCode: document.querySelector("#modalCode"),
      modalBody: document.querySelector("#modalBody")
    };

    function money(value) {
      return Number(value || 0).toLocaleString("zh-TW", {
        style: "currency",
        currency: "TWD",
        maximumFractionDigits: 0
      });
    }

    function esc(value) {
      return String(value ?? "").replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#039;"
      }[char]));
    }

    function safeUrl(value) {
      const text = String(value || "").trim();
      if (!text) return "";
      try {
        const url = new URL(text);
        return ["http:", "https:"].includes(url.protocol) ? url.toString() : "";
      } catch (_error) {
        return "";
      }
    }

    function cleanKey(value) {
      return String(value || "").trim().toLowerCase();
    }

    function linkButton(label, url) {
      const safe = safeUrl(url);
      if (!safe) return `<div class="link-button empty"><span>${esc(label)}</span><span>未設定</span></div>`;
      return `<a class="link-button" href="${esc(safe)}" target="_blank" rel="noopener noreferrer"><span>${esc(label)}</span><span>開啟</span></a>`;
    }

    function saveSession() {
      if (!state.user) return;
      localStorage.setItem(sessionKey, JSON.stringify(state.user));
    }

    function clearSession() {
      localStorage.removeItem(sessionKey);
    }

    async function restoreSession() {
      const raw = localStorage.getItem(sessionKey);
      if (!raw) return;
      try {
        state.user = JSON.parse(raw);
        if (!state.user?.token) throw new Error("session token missing");
        state.page = "home";
        els.loginScreen.classList.add("hidden");
        els.appScreen.classList.remove("hidden");
        els.bottomNav.classList.remove("hidden");
        await refreshCases();
      } catch (_error) {
        state.user = null;
        clearSession();
        els.loginScreen.classList.remove("hidden");
        els.appScreen.classList.add("hidden");
        els.bottomNav.classList.add("hidden");
      }
    }

    function splitAmount(split, quote) {
      if (Number.isFinite(Number(split?.amount))) return Number(split.amount || 0);
      const value = Number(split?.value || 0);
      if (split?.method === "百分比") return Math.round(Number(quote || 0) * value / 100);
      return Math.round(value);
    }

    function caseSplitTotal(item) {
      return (item.splits || []).reduce((sum, split) => sum + splitAmount(split, item.quote), 0);
    }

    function caseProfit(item) {
      return Number(item.quote || 0) - Number(item.cost || 0);
    }

    function unassignedCost(item) {
      return Number(item.cost || 0) - caseSplitTotal(item);
    }

    function aliasesForCurrentUser() {
      if (!state.user) return [];
      return [state.user.employee, state.user.label, state.user.email, state.user.role].map(cleanKey).filter(Boolean);
    }

    function splitRowsForUser(item) {
      if (state.user?.isBoss) return item.splits || [];
      const aliases = aliasesForCurrentUser();
      return (item.splits || []).filter(split => aliases.includes(cleanKey(split.employee)));
    }

    function caseChecklist(type) {
      return caseTypes[caseTypeAliases[type] || type] || caseTypes["歌唱課"] || [];
    }

    function canSeeOwnStaffRental(item) {
      if (!state.user || state.user.isBoss) return false;
      const aliases = aliasesForCurrentUser();
      return item.type === "員工錄音室租借" && aliases.includes(cleanKey(item.owner));
    }

    function splitMethodLabel(split) {
      return split.method === "百分比" ? `${Number(split.value || 0)}%` : money(split.value);
    }

    function splitWorkTypes(split) {
      const raw = Array.isArray(split?.workTypes) && split.workTypes.length
        ? split.workTypes
        : String(split?.workType || "").split("/");
      return raw.map(item => item.trim()).filter(Boolean);
    }

    function splitWorkTypeLabel(split) {
      return splitWorkTypes(split).join(" / ") || "未設定工作";
    }

    function setSplitWorkTypes(row, selectedTypes = []) {
      if (!row) return;
      const selected = new Set(Array.isArray(selectedTypes) ? selectedTypes : [selectedTypes]);
      row.querySelectorAll("[data-split-work-type]").forEach(input => {
        input.checked = selected.has(input.value);
      });
    }

    function updateCustomEmployeeField(select) {
      const row = select.closest("[data-split-row]");
      const field = row?.querySelector("[data-custom-employee-field]");
      if (!field) return;
      field.classList.toggle("hidden", select.value !== "__custom");
      if (select.value !== "__custom") {
        const input = field.querySelector("[data-split-custom-employee]");
        if (input) input.value = "";
      }
    }

    function splitRowEmployee(row) {
      const selectedEmployee = row.querySelector("[data-split-employee]")?.value || "";
      if (selectedEmployee === "__custom") return row.querySelector("[data-split-custom-employee]")?.value.trim() || "外包";
      return selectedEmployee;
    }

    function collectSplitRows(root = document) {
      return [...root.querySelectorAll("[data-split-row]")]
        .map(row => ({
          employee: splitRowEmployee(row),
          workTypes: [...row.querySelectorAll("[data-split-work-type]:checked")].map(input => input.value),
          method: row.querySelector("[data-split-method]")?.value || "固定金額",
          value: Number(row.querySelector("[data-split-value]")?.value || 0),
          note: row.querySelector("[data-split-note]")?.value.trim() || ""
        }))
        .filter(split => split.employee && split.workTypes.length && split.value > 0);
    }

    async function api(path, options = {}) {
      const headers = { "Content-Type": "application/json", ...(options.headers || {}) };
      if (state.user?.token) headers["X-Studio-Token"] = state.user.token;
      const response = await fetch(path, {
        headers,
        ...options
      });
      if (!response.ok) {
        let message = "資料庫連線或伺服器發生錯誤。";
        try {
          const body = await response.json();
          if (body.error) message = body.error;
        } catch (_error) {}
        throw new Error(message);
      }
      return response.status === 204 ? null : response.json();
    }

    function authQuery() {
      return `requesterId=${encodeURIComponent(state.user.id)}`;
    }

    function authPayload(payload = {}) {
      return {
        requesterId: state.user.id,
        ...payload
      };
    }

    async function refreshCases() {
      state.loading = true;
      state.apiError = "";
      renderApp();
      try {
        const [cases, records, expenses, payments, studioExpenseModel, historicalRevenues] = await Promise.all([
          api(`/api/cases?${authQuery()}`),
          state.user.isBoss ? api(`/api/company-records?${authQuery()}`) : Promise.resolve([]),
          api(`/api/expense-claims?${authQuery()}`),
          state.user.isBoss ? api(`/api/payment-schedules?${authQuery()}`) : Promise.resolve([]),
          state.user.isBoss ? api(`/api/studio-expense-model?${authQuery()}`) : Promise.resolve(defaultStudioExpenseModel),
          state.user.isBoss ? api(`/api/historical-revenues?${authQuery()}`) : Promise.resolve([])
        ]);
        state.cases = cases;
        state.records = records;
        state.expenses = expenses;
        state.payments = payments;
        state.studioExpenseModel = studioExpenseModel;
        state.historicalRevenues = historicalRevenues;
        if (state.user.isBoss) state.users = await api(`/api/users?${authQuery()}`);
      } catch (error) {
        state.apiError = error.message;
        state.cases = [];
        state.records = [];
        state.expenses = [];
        state.payments = [];
        state.historicalRevenues = [];
        state.users = [];
        state.studioExpenseModel = defaultStudioExpenseModel;
      } finally {
        state.loading = false;
        renderApp();
      }
    }

    function visibleCases() {
      if (!state.user) return [];
      if (state.user.isBoss) return state.cases;
      const aliases = aliasesForCurrentUser();
      return state.cases.filter(item =>
        aliases.includes(cleanKey(item.owner)) ||
        (item.splits || []).some(split => aliases.includes(cleanKey(split.employee)))
      );
    }

    function progressOf(item) {
      if (!item.checklist.length) return 0;
      return Math.round(item.checklist.filter(Boolean).length / item.checklist.length * 100);
    }

    function deliveryText(item) {
      if (item.status === "需修改") return "老闆要求修改";
      if (item.deliveryUrl) return "已提供交付連結";
      if (item.driveFolderUrl || item.sourceMaterialUrl) return "已有雲端資料夾";
      return "未設定交付位置";
    }

    function statusOptions(currentStatus) {
      const normal = ["新接案", "製作中", "待驗收", "已完成", "暫緩"];
      const options = state.user.isBoss ? ["新接案", "製作中", "待驗收", "需修改", "已完成", "暫緩"] : normal;
      if (!options.includes(currentStatus)) options.splice(3, 0, currentStatus);
      return options;
    }

    async function login(event) {
      event.preventDefault();
      let account;
      try {
        account = await api("/api/login", {
          method: "POST",
          body: JSON.stringify({
            email: els.username.value.trim().toLowerCase(),
            password: els.password.value
          })
        });
      } catch (error) {
        els.loginError.textContent = error.message;
        return;
      }
      state.user = account;
      state.page = "home";
      saveSession();
      els.loginError.textContent = "";
      els.username.value = "";
      els.password.value = "";
      els.loginScreen.classList.add("hidden");
      els.appScreen.classList.remove("hidden");
      els.bottomNav.classList.remove("hidden");
      await refreshCases();
    }

    function logout() {
      state.user = null;
      clearSession();
      els.loginScreen.classList.remove("hidden");
      els.appScreen.classList.add("hidden");
      els.bottomNav.classList.add("hidden");
      closeModal();
    }

    function navItems() {
      const items = [
        { key: "home", label: "首頁", icon: "home" },
        { key: "cases", label: "案件", icon: "briefcase" },
        { key: "calendar", label: "行事曆", icon: "calendar" }
      ];
      if (state.user.isBoss) {
        items.push({ key: "new", label: "新增", icon: "plus" });
        items.push({ key: "company", label: "行政", icon: "clipboard" });
        items.push({ key: "finance", label: "財務", icon: "chart" });
        items.push({ key: "studioExpenses", label: "支出", icon: "receipt" });
        items.push({ key: "historicalRevenue", label: "營收", icon: "chart" });
      } else {
        items.push({ key: "expense", label: "報帳", icon: "receipt" });
      }
      return items;
    }

    function icon(name) {
      const paths = {
        home: '<path d="m3 11 9-8 9 8"/><path d="M5 10v10h14V10"/><path d="M9 20v-6h6v6"/>',
        briefcase: '<path d="M10 6V5a2 2 0 0 1 2-2h0a2 2 0 0 1 2 2v1"/><path d="M4 7h16v12H4z"/><path d="M4 12h16"/>',
        plus: '<path d="M12 5v14M5 12h14"/>',
        clipboard: '<path d="M9 4h6l1 2h3v15H5V6h3z"/><path d="M9 11h6M9 15h6"/>',
        receipt: '<path d="M6 3h12v18l-2-1-2 1-2-1-2 1-2-1-2 1z"/><path d="M9 8h6M9 12h6M9 16h4"/>',
        calendar: '<path d="M8 2v4M16 2v4"/><path d="M3 10h18"/><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M8 14h.01M12 14h.01M16 14h.01M8 18h.01M12 18h.01"/>',
        chart: '<path d="M4 19V5"/><path d="M4 19h16"/><path d="M8 16v-5"/><path d="M12 16V8"/><path d="M16 16v-9"/>'
      };
      return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor">${paths[name]}</svg>`;
    }

    function renderNav() {
      els.bottomNav.innerHTML = navItems().map(item => `
        <button class="nav-btn ${state.page === item.key ? "active" : ""}" type="button" data-page="${item.key}" aria-label="${item.label}">
          ${icon(item.icon)}
          <span>${item.label}</span>
        </button>
      `).join("");
    }

    function renderApp() {
      if (!state.user) return;
      if (!state.user.isBoss && !["home", "cases", "calendar", "expense"].includes(state.page)) state.page = "home";
      renderNav();
      const titleMap = { home: "首頁", cases: "案件管理", calendar: "行事曆", new: "新增案件", company: "行政", finance: "財務", studioExpenses: "工作室支出統計", historicalRevenue: "晨嵐歷史營收管理", expense: "報帳" };
      els.pageTitle.textContent = titleMap[state.page];
      els.eyebrow.textContent = state.user.isBoss ? "老闆視角" : "";
      els.logoutBtn.innerHTML = `<span>${state.user.icon}</span><span>登出</span>`;
      if (state.loading) {
        els.viewRoot.innerHTML = `<div class="panel"><p class="muted">正在讀取 Zeabur 資料庫...</p></div>`;
        return;
      }
      if (state.apiError) {
        els.viewRoot.innerHTML = `<div class="panel"><h3>資料庫暫時無法讀取</h3><p class="muted">${state.apiError}</p></div>`;
        return;
      }
      if (state.page === "home") renderHome();
      if (state.page === "cases") renderCases();
      if (state.page === "calendar") renderCalendar();
      if (state.page === "new") renderNewCase();
      if (state.page === "company") renderCompany();
      if (state.page === "finance") renderFinance();
      if (state.page === "studioExpenses") renderStudioExpenses();
      if (state.page === "historicalRevenue") renderHistoricalRevenue();
      if (state.page === "expense") renderExpense();
    }

    function stats(items = visibleCases()) {
      return {
        total: items.reduce((sum, item) => sum + Number(item.quote || 0), 0),
        ongoing: items.filter(item => item.status === "製作中").length,
        review: items.filter(item => item.status === "待驗收").length,
        done: items.filter(item => item.status === "已完成").length,
        count: items.length
      };
    }

    function payrollFor(name) {
      const employee = employeeList().find(item => item.name === name);
      const aliases = [name, employee?.email, employee?.label, employee?.role].map(cleanKey).filter(Boolean);
      const doneCases = state.cases.filter(item =>
        item.status === "已完成" &&
        ((item.splits || []).some(split => aliases.includes(cleanKey(split.employee))) || aliases.includes(cleanKey(item.owner)))
      );
      const revenue = doneCases.reduce((sum, item) => sum + Number(item.quote || 0), 0);
      const splitPay = doneCases.reduce((sum, item) => {
        return sum + (item.splits || [])
          .filter(split => aliases.includes(cleanKey(split.employee)))
          .reduce((splitSum, split) => splitSum + splitAmount(split, item.quote), 0);
      }, 0);
      return {
        base: employee?.base || 0,
        bonus: splitPay,
        total: (employee?.base || 0) + splitPay,
        cases: state.cases.filter(item =>
          aliases.includes(cleanKey(item.owner)) || (item.splits || []).some(split => aliases.includes(cleanKey(split.employee)))
        ).length,
        revenue
      };
    }

    function employeeList() {
      return state.users
        .filter(user => !user.isBoss)
        .map(user => ({
          name: user.label,
          email: user.email,
          label: user.label,
          role: user.role,
          workTypes: user.workTypes || [],
          base: Number(user.baseSalary || 0),
          bonusRate: 0
        }));
    }

    function emptyPanel(text = "目前資料庫沒有案件。") {
      return `<div class="panel"><p class="muted">${text}</p></div>`;
    }

    function localDateString(date = new Date()) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function localMonthString(date = new Date()) {
      return localDateString(date).slice(0, 7);
    }

    function monthlyPettyCash() {
      const month = localMonthString();
      return state.records
        .filter(record => record.kind === "零用金" && record.paymentStatus === "已支出" && String(record.date).startsWith(month))
        .reduce((sum, record) => sum + Number(record.amount || 0), 0);
    }

    function pendingPettyCash() {
      const month = localMonthString();
      return state.records
        .filter(record => record.kind === "零用金" && record.paymentStatus === "未支出" && String(record.date).startsWith(month))
        .reduce((sum, record) => sum + Number(record.amount || 0), 0);
    }

    function paymentsForCase(caseId) {
      return state.payments.filter(payment => payment.caseId === caseId);
    }

    function paymentSummary(payments = state.payments) {
      const today = localDateString();
      return {
        totalDue: payments.reduce((sum, payment) => sum + Number(payment.amount || 0), 0),
        paid: payments.filter(payment => payment.status === "已收").reduce((sum, payment) => sum + Number(payment.amount || 0), 0),
        unpaid: payments.filter(payment => payment.status !== "已收").reduce((sum, payment) => sum + Number(payment.amount || 0), 0),
        overdue: payments.filter(payment => payment.status !== "已收" && payment.dueDate < today).reduce((sum, payment) => sum + Number(payment.amount || 0), 0),
        cash: payments.filter(payment => payment.status === "已收" && payment.method === "現金").reduce((sum, payment) => sum + Number(payment.amount || 0), 0)
      };
    }

    function renderRecordRows(records = state.records) {
      return records.map(record => `
        <div class="record-row">
          <div class="split">
            <div>
              <h3>${esc(record.title)}</h3>
              <p class="small">${esc(record.date)} · ${esc(record.kind)}</p>
            </div>
            <span class="badge status-${esc(record.paymentStatus || "不適用")}">${esc(record.paymentStatus || "不適用")}</span>
          </div>
          <div class="split">
            <span class="small">${record.kind === "零用金" ? "零用金金額" : "紀錄類型"}</span>
            <strong>${record.kind === "零用金" ? money(record.amount) : "公司狀態"}</strong>
          </div>
          <p class="muted">${esc(record.notes || "沒有補充說明。")}</p>
          <button class="ghost" type="button" data-delete-record="${record.id}">刪除紀錄</button>
        </div>
      `).join("");
    }

    function renderExpenseRows(expenses = state.expenses) {
      return expenses.map(expense => `
        <div class="expense-row">
          <div class="split">
            <div>
              <h3>${esc(expense.itemName)}</h3>
              <p class="small">${esc(expense.purchaseDate)} · ${esc(expense.employeeName)}</p>
            </div>
            <strong>發票</strong>
          </div>
          ${expense.receiptImage ? `<img class="receipt-thumb" src="${esc(expense.receiptImage)}" alt="${esc(expense.itemName)} 發票">` : `<p class="muted">沒有發票照片。</p>`}
        </div>
      `).join("");
    }

    function renderHome() {
      const items = visibleCases();
      const s = stats(items);
      if (state.user.isBoss) {
        els.viewRoot.innerHTML = `
          <div class="grid metrics">
            <div class="metric"><span>本月總收入</span><b>${money(s.total)}</b></div>
            <div class="metric"><span>進行中案件</span><b>${s.ongoing}</b></div>
            <div class="metric"><span>待驗收</span><b>${s.review}</b></div>
            <div class="metric"><span>已完成</span><b>${s.done}</b></div>
          </div>
          <div class="section-title"><h3>員工概覽</h3></div>
          <div class="grid">
            ${employeeList().map(employee => {
              const pay = payrollFor(employee.name);
              return `<div class="pay-row">
                <div>
                  <h3>${employee.name}</h3>
                  <p class="small">${pay.cases} 件案件 · ${employee.workTypes.length ? employee.workTypes.join(" / ") : "本月工作未設定"} · 業績 ${money(pay.revenue)}</p>
                </div>
                <strong>${money(pay.total)}</strong>
              </div>`;
            }).join("")}
          </div>
          <div class="section-title"><h3>公司狀態 / 零用金</h3><button class="ghost" type="button" data-page="company">記錄</button></div>
          <div class="grid metrics">
            <div class="metric"><span>本月零用金</span><b>${money(monthlyPettyCash())}</b></div>
            <div class="metric"><span>未支出零用金</span><b>${money(pendingPettyCash())}</b></div>
          </div>
          <div class="grid">${state.records.length ? renderRecordRows(state.records.slice(0, 2)) : emptyPanel("目前沒有公司行政紀錄。")}</div>
          <div class="section-title"><h3>近期案件</h3><button class="ghost" type="button" data-page="cases">查看</button></div>
          <div class="grid">${items.length ? renderCaseCards(items.slice(0, 3)) : emptyPanel()}</div>
          ${renderPasswordPanel()}
        `;
        return;
      }

      const pay = payrollFor(state.user.employee);
      els.viewRoot.innerHTML = `
        <div class="panel">
          <h2>${state.user.icon} ${state.user.employee}，今天辛苦了</h2>
        </div>
        <div class="panel">

    function setupHourlyControls() {
      const caseType = document.querySelector("#caseType");
      const panel = document.querySelector("#hourlyPanel");
      const title = document.querySelector("#hourlyPanelTitle");
      const preset = document.querySelector("#hourlyPricingPreset");
      const hours = document.querySelector("#hourlyHours");
      const rate = document.querySelector("#hourlyRate");
      const quote = document.querySelector("#quote");
      const firstSplitEmployee = document.querySelector("[data-split-employee]");
      const firstSplitRow = document.querySelector("[data-split-row]");
      const firstSplitWorkTypes = document.querySelector("[data-split-work-types]");
      const firstSplitMethod = document.querySelector("[data-split-method]");
      const firstSplitValue = document.querySelector("[data-split-value]");
      const firstSplitNote = document.querySelector("[data-split-note]");
      const addSplitButton = document.querySelector("[data-add-split-row]");
      const lockedCourseTypes = ["歌唱課", "編曲課"];

      const setReadonly = (input, locked) => {
        if (!input) return;
        input.readOnly = locked;
        input.setAttribute("aria-readonly", locked ? "true" : "false");
      };

      const setDisabled = (input, locked) => {
        if (!input) return;
        input.disabled = locked;
        input.querySelectorAll?.("input, select, button").forEach(child => {
          child.disabled = locked;
        });
      };

      const refreshQuote = () => {
        if (!isHourlyCase(caseType.value)) return;
        const total = Math.round(Number(hours.value || 0) * Number(rate.value || 0));
        quote.value = String(total);
      };

      const applyPreset = () => {
        if (preset.value === "recording") rate.value = "1200";
        if (preset.value === "friend") rate.value = "1000";
        if (preset.value === "standard") rate.value = "1200";
        if (preset.value === "staffRental") {
          rate.value = "1000";
          if (firstSplitEmployee && !firstSplitEmployee.value) firstSplitEmployee.value = document.querySelector("#owner").value;
          setSplitWorkTypes(firstSplitRow, ["員工錄音室租借"]);
          if (firstSplitNote) firstSplitNote.value = "員工錄音室租借，棚租 1000 / 小時";
        }
        if (preset.value === "vocalCourse") {
          hours.value = "4";
          rate.value = "1000";
          if (firstSplitEmployee) firstSplitEmployee.value = document.querySelector("#owner").value;
          setSplitWorkTypes(firstSplitRow, ["歌唱課"]);
          if (firstSplitMethod) firstSplitMethod.value = "百分比";
          if (firstSplitValue) firstSplitValue.value = "70";
          if (firstSplitNote) firstSplitNote.value = "歌唱課 4000 / 月，4 小時，老師 7 成、晨嵐 3 成";
        }
        if (preset.value === "arrangementCourse") {
          hours.value = "2";
          rate.value = "1000";
          if (firstSplitEmployee) firstSplitEmployee.value = document.querySelector("#owner").value;
          setSplitWorkTypes(firstSplitRow, ["編曲課"]);
          if (firstSplitMethod) firstSplitMethod.value = "百分比";
          if (firstSplitValue) firstSplitValue.value = "70";
          if (firstSplitNote) firstSplitNote.value = "編曲課 2000 / 堂，2 小時，老師 7 成、晨嵐 3 成";
        }
        if (preset.value === "partner") {
          rate.value = "1500";
          if (firstSplitEmployee && !firstSplitEmployee.value) firstSplitEmployee.value = document.querySelector("#owner").value;
          setSplitWorkTypes(firstSplitRow, ["非員工錄音室租借"]);
          if (firstSplitMethod) firstSplitMethod.value = "百分比";
          if (firstSplitValue && !firstSplitValue.value) firstSplitValue.value = "70";
          if (firstSplitNote && !firstSplitNote.value) firstSplitNote.value = "前員工帶單拆帳 7/3，晨嵐留 3 成";
        }
        refreshQuote();
      };

      const toggleHourly = () => {
        const enabled = isHourlyCase(caseType.value);
        const staffRental = caseType.value === "員工錄音室租借";
        const lockedCourse = lockedCourseTypes.includes(caseType.value);
        panel.classList.toggle("hidden", !enabled);
        title.textContent = ["歌唱課", "編曲課"].includes(caseType.value) ? "課程時數" : caseType.value.includes("錄音室租借") ? caseType.value : "錄音時數";
        if (caseType.value === "錄音" && preset.value === "custom" && !rate.value) preset.value = "recording";
        preset.disabled = staffRental || lockedCourse;
        setReadonly(hours, lockedCourse);
        setReadonly(rate, staffRental || lockedCourse);
        setDisabled(firstSplitWorkTypes, lockedCourse);
        setDisabled(firstSplitMethod, lockedCourse);
        setReadonly(firstSplitValue, lockedCourse);
        setDisabled(addSplitButton, lockedCourse);
        if (lockedCourse) [...document.querySelectorAll("[data-split-row]")].slice(1).forEach(row => row.remove());
        if (staffRental) preset.value = "staffRental";
        if (caseType.value === "歌唱課") preset.value = "vocalCourse";
        if (caseType.value === "編曲課") preset.value = "arrangementCourse";
        if (enabled) applyPreset();
      };

      caseType.addEventListener("change", toggleHourly);
      preset.addEventListener("change", applyPreset);
      hours.addEventListener("input", refreshQuote);
      rate.addEventListener("input", () => {
        if (caseType.value === "員工錄音室租借") rate.value = "1000";
        if (caseType.value === "歌唱課" || caseType.value === "編曲課") rate.value = "1000";
        refreshQuote();
      });
      toggleHourly();
    }

    function setupPodcastControls() {
      const caseType = document.querySelector("#caseType");
      const panel = document.querySelector("#podcastPanel");
      const channel = document.querySelector("#podcastChannel");
      const episodeName = document.querySelector("#podcastEpisodeName");
      const recordedAt = document.querySelector("#podcastRecordedAt");
      const fee = document.querySelector("#podcastEditFee");
      const revenue = document.querySelector("#podcastRevenue");
      const summary = document.querySelector("#podcastSummary");
      const quote = document.querySelector("#quote");
      const cost = document.querySelector("#cost");

      const syncPodcast = () => {
        if (!isPodcastSingleCase(caseType.value)) return;
        const amount = Math.round(Number(fee.value || 0));
        quote.value = String(Number(revenue.value || 0));
        cost.value = "0";
        summary.textContent = `本集員工剪輯費 ${money(amount)}；本集收款 ${money(Number(revenue.value || 0))}。勾到已交付後，老闆財務會列為應付。`;
        if (channel.value.trim() && !client.value.trim()) client.value = channel.value.trim();
        if (!caseName.value.trim() || caseName.dataset.autoPodcastName === "true") {
          caseName.value = `${channel.value.trim() || "Podcast"}｜${episodeName.value.trim() || "單集製作"}`;
          caseName.dataset.autoPodcastName = "true";
        }
        if (firstSplitEmployee) firstSplitEmployee.value = owner.value;
        setSplitWorkTypes(firstSplitRow, [podcastSingleType]);
        if (firstSplitMethod) firstSplitMethod.value = "固定金額";
        if (firstSplitValue) firstSplitValue.value = String(amount);
        if (firstSplitNote) firstSplitNote.value = `Podcast 單集剪輯，已交付後支付 ${money(amount)}`;
      };

      const togglePodcast = () => {
        const enabled = isPodcastSingleCase(caseType.value);
        panel.classList.toggle("hidden", !enabled);
        if (enabled && !recordedAt.value) recordedAt.value = document.querySelector("#start").value || localDateString();
        if (enabled) syncPodcast();
      };

      [channel, episodeName, recordedAt, fee, revenue, owner].forEach(input => input.addEventListener("input", syncPodcast));
      caseType.addEventListener("change", togglePodcast);
      caseName.addEventListener("input", () => {
        caseName.dataset.autoPodcastName = "false";
      });
      togglePodcast();
    }

    function imageFileToDataUrl(file) {
      return new Promise((resolve, reject) => {
        if (!file) {
          reject(new Error("請上傳發票照片"));
          return;
        }
        const img = new Image();
        const reader = new FileReader();
        reader.onerror = () => reject(new Error("發票照片讀取失敗"));
        reader.onload = () => {
          img.onerror = () => reject(new Error("發票照片格式不正確"));
          img.onload = () => {
            const maxSide = 1200;
            const scale = Math.min(1, maxSide / Math.max(img.width, img.height));
            const canvas = document.createElement("canvas");
            canvas.width = Math.max(1, Math.round(img.width * scale));
            canvas.height = Math.max(1, Math.round(img.height * scale));
            const ctx = canvas.getContext("2d");
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            resolve(canvas.toDataURL("image/jpeg", 0.74));
          };
          img.src = reader.result;
        };
        reader.readAsDataURL(file);
      });
    }

    function yearlyRevenueRows(items = state.historicalRevenues) {
      const map = new Map();
      items.forEach(item => {
        const year = String(item.projectDate || "").slice(0, 4) || "未填年份";
        const row = map.get(year) || { year, total: 0, received: 0, unpaid: 0, count: 0 };
        row.total += Number(item.totalAmount || 0);
        row.received += Number(item.receivedAmount || 0);
        row.unpaid += Number(item.unpaidAmount || 0);
        row.count += 1;
        map.set(year, row);
      });
      return [...map.values()].sort((a, b) => String(b.year).localeCompare(String(a.year)));
    }

    function clientRevenueRows(items = state.historicalRevenues) {
      const map = new Map();
      items.forEach(item => {
        const key = `${item.clientName}|${item.phone}`;
        const row = map.get(key) || { clientName: item.clientName, phone: item.phone, total: 0, received: 0, unpaid: 0, count: 0 };
        row.total += Number(item.totalAmount || 0);
        row.received += Number(item.receivedAmount || 0);
        row.unpaid += Number(item.unpaidAmount || 0);
        row.count += 1;
        map.set(key, row);
      });
      return [...map.values()].sort((a, b) => b.total - a.total).slice(0, 8);
    }

    function studioExpenseSummary(model = state.studioExpenseModel) {
      const monthlyTotal = (model.monthlyExpenses || []).reduce((sum, item) => sum + Number(item.amount || 0), 0);
      const totalMonths = Number(model.totalMonths || 0);
      const garyRatio = Number(model.splitRatio?.gary ?? 0.5);
      const partnerRatio = Number(model.splitRatio?.partner ?? 0.5);
      const totalOperatingCost = monthlyTotal * totalMonths;
      const garyOperatingCost = Math.round(totalOperatingCost * garyRatio);
      const partnerOperatingCost = Math.round(totalOperatingCost * partnerRatio);
      const totalOneTimeCost = (model.oneTimeCosts || []).reduce((sum, item) => sum + Number(item.amount || 0), 0);
      const garyOneTimeCost = Math.round(totalOneTimeCost * garyRatio);
      const partnerOneTimeCost = Math.round(totalOneTimeCost * partnerRatio);
      return {
        monthlyTotal,
        garyMonthly: Math.round(monthlyTotal * garyRatio),
        partnerMonthly: Math.round(monthlyTotal * partnerRatio),
        totalOperatingCost,
        garyOperatingCost,
        partnerOperatingCost,
        totalOneTimeCost,
        garyOneTimeCost,
        partnerOneTimeCost,
        studioTotalInvestment: totalOperatingCost + totalOneTimeCost,
        garyTotalInvestment: garyOperatingCost + garyOneTimeCost,
        partnerTotalInvestment: partnerOperatingCost + partnerOneTimeCost
      };
    }

          <div class="checklist">
            ${caseChecklist(item.type).map((label, index) => {

              return `
              <label class="check-item">

            ${linkButton("客戶素材", sourceMaterialUrl)}
            ${linkButton("最終交付", deliveryUrl)}
          </div>
          <form id="deliveryForm" class="delivery-form" data-delivery-for="${esc(item.id)}">
            <div class="field"><label for="modalDriveFolderUrl">工作資料夾</label><input id="modalDriveFolderUrl" type="url" inputmode="url" value="${esc(driveFolderUrl)}" placeholder="Google Drive 內部工作資料夾"></div>
            <div class="field"><label for="modalSourceMaterialUrl">客戶素材</label><input id="modalSourceMaterialUrl" type="url" inputmode="url" value="${esc(sourceMaterialUrl)}" placeholder="客戶素材或上傳資料夾"></div>
            <div class="field"><label for="modalDeliveryUrl">最終交付</label><input id="modalDeliveryUrl" type="url" inputmode="url" value="${esc(deliveryUrl)}" placeholder="最後交給客戶的 Google Drive 連結"></div>
            <div class="field"><label for="modalDeliveryNotes">交付備註</label><textarea id="modalDeliveryNotes" placeholder="版本、檔案格式、交付注意事項">${esc(item.deliveryNotes || "")}</textarea></div>

          <div class="split"><span>報價金額</span><strong>${money(item.quote)}</strong></div>
          <div class="split"><span>預估成本總額</span><strong>${money(item.cost)}</strong></div>
          <div class="split"><span>已列明成本</span><strong>${money(caseSplitTotal(item))}</strong></div>
          <div class="split"><span>未列明成本</span><strong>${money(unassignedCost(item))}</strong></div>
          <div class="split"><span>預估利潤</span><strong>${money(caseProfit(item))}</strong></div>
          <div class="section-title">
            <h3>拆帳明細</h3>
            <button class="ghost compact-action" type="button" data-open-financial-editor="add">新增分潤 / 外包</button>

          <button class="primary" type="submit">儲存案件備註</button>

        <p class="${canSeeMoney ? "hidden" : "muted"}">${esc(item.notes || "無備註")}</p>
        <div class="form-actions">
          <button class="ghost" type="button" data-delete="${item.id}">刪除</button>
          <button class="primary" type="button" data-close-modal>完成</button>
        </div>
      `;
      els.caseModal.classList.add("open");
    }

    function closeModal() {

      state.cases = state.cases.map(entry => entry.id === id ? item : entry);

    async function saveCaseFinancials(form, { rerender = true, reopen = true } = {}) {
      const id = form.dataset.financialFor;
      const item = await api(`/api/cases/${id}/financials`, {
        method: "PATCH",
        body: JSON.stringify(authPayload({
          role: state.user.isBoss ? "owner" : "staff",
          quote: Number(form.querySelector("#modalQuote")?.value || 0),
          cost: Number(form.querySelector("#modalCost")?.value || 0),
          rentalHours: Number(form.querySelector("#modalRentalHours")?.value || 0),
          rentalHourlyRate: Number(form.querySelector("#modalRentalHourlyRate")?.value || 0),
          rentalPricingNote: form.querySelector("#modalRentalPricingNote")?.value.trim() || "",
          splits: collectSplitRows(form)
        }))
      });
      state.cases = state.cases.map(entry => entry.id === id ? item : entry);
      if (rerender) renderApp();
      if (reopen) openCase(id);
      return item;
    }

    async function createPaymentSchedule(event) {
      event.preventDefault();
      const caseId = event.target.dataset.paymentCase;
      const payment = await api("/api/payment-schedules", {
        method: "POST",
        body: JSON.stringify(authPayload({
          caseId,
          title: document.querySelector("#paymentTitle").value.trim(),
          dueDate: document.querySelector("#paymentDueDate").value,
          amount: Number(document.querySelector("#paymentAmount").value || 0),
          status: document.querySelector("#paymentStatus").value,
          paidDate: document.querySelector("#paymentPaidDate").value,
          method: document.querySelector("#paymentMethod").value,
          notes: document.querySelector("#paymentNotes").value.trim()
        }))
      });
      state.payments.push(payment);
      renderApp();
      openCase(caseId);
    }

    async function createInstallmentSchedules(caseId) {
      const amount = Number(document.querySelector("#quickInstallmentAmount").value || 0);
      const dates = [
        document.querySelector("#quickFirstDate").value,
        document.querySelector("#quickSecondDate").value,
        document.querySelector("#quickThirdDate").value
      ].filter(Boolean);
      const firstStatus = document.querySelector("#quickFirstStatus").value;
      const method = document.querySelector("#quickMethod").value;
      if (!amount || !dates.length) {
        alert("請填每期金額，並至少選一個日期。");
        return;
      }
      const created = [];
      for (let index = 0; index < dates.length; index += 1) {
        const dueDate = dates[index];
        const status = index === 0 ? firstStatus : "未收";
        const payment = await api("/api/payment-schedules", {
          method: "POST",
          body: JSON.stringify(authPayload({
            caseId,
            title: `第 ${index + 1} 期`,
            dueDate,
            amount,
            status,
            paidDate: status === "已收" ? dueDate : "",
            method,
            notes: index === 0 && status === "已收" ? "第一期已收" : ""
          }))
        });
        created.push(payment);
      }
      state.payments.push(...created);
      renderApp();
      openCase(caseId);
    }

    async function togglePaymentSchedule(id, status) {
      const existing = state.payments.find(payment => String(payment.id) === String(id));
      const payment = await api(`/api/payment-schedules/${id}`, {
        method: "PATCH",
        body: JSON.stringify(authPayload({
          status,
          paidDate: status === "已收" ? localDateString() : "",
          method: existing?.method || "現金",
          notes: existing?.notes || ""
        }))
      });
      state.payments = state.payments.map(item => String(item.id) === String(id) ? payment : item);
      renderApp();
      openCase(payment.caseId);
    }

    async function deletePaymentSchedule(id) {
      const existing = state.payments.find(payment => String(payment.id) === String(id));
      await api(`/api/payment-schedules/${id}`, {
        method: "DELETE",
        body: JSON.stringify(authPayload())
      });
      state.payments = state.payments.filter(payment => String(payment.id) !== String(id));
      renderApp();
      if (existing) openCase(existing.caseId);
    }

    async function deleteCase(id) {
      await api(`/api/cases/${id}`, {
        method: "DELETE",
        body: JSON.stringify(authPayload())
      });
      state.cases = state.cases.filter(item => item.id !== id);
      closeModal();
      renderApp();
    }

    document.addEventListener("click", event => {
      const pageBtn = event.target.closest("[data-page]");
      if (pageBtn) {
        state.page = pageBtn.dataset.page;
        renderApp();
      }

      const filterBtn = event.target.closest("[data-filter]");
      if (filterBtn) {
        state.filter = filterBtn.dataset.filter;
        renderCases();
      }

      const caseBtn = event.target.closest("[data-case]");
      if (caseBtn) openCase(caseBtn.dataset.case);

      const addSplitBtn = event.target.closest("[data-add-split-row]");
      if (addSplitBtn) addSplitRow();

      const addFinancialSplitBtn = event.target.closest("[data-add-financial-split-row]");
      if (addFinancialSplitBtn) addFinancialSplitRow();

      const openFinancialEditorBtn = event.target.closest("[data-open-financial-editor]");
      if (openFinancialEditorBtn) openFinancialEditor(openFinancialEditorBtn.dataset.openFinancialEditor);

      const removeSplitBtn = event.target.closest("[data-remove-split-row]");
      if (removeSplitBtn) removeSplitBtn.closest("[data-split-row]")?.remove();

      const closeBtn = event.target.closest("[data-close-modal]");
      if (closeBtn) {
        closeModalWithFinancialSave().catch(error => alert(error.message));
        return;
      }

      const deleteBtn = event.target.closest("[data-delete]");
      if (deleteBtn && confirm("這會從 Zeabur 資料庫刪除此案件，確定刪除？")) {
        deleteCase(deleteBtn.dataset.delete).catch(error => alert(error.message));
      }

      const deleteRecordBtn = event.target.closest("[data-delete-record]");
      if (deleteRecordBtn && confirm("這會從 Zeabur 資料庫刪除此行政紀錄，確定刪除？")) {
        deleteCompanyRecord(deleteRecordBtn.dataset.deleteRecord).catch(error => alert(error.message));
      }

      const togglePaymentBtn = event.target.closest("[data-toggle-payment]");
      if (togglePaymentBtn) {
        togglePaymentSchedule(togglePaymentBtn.dataset.togglePayment, togglePaymentBtn.dataset.paymentStatus).catch(error => alert(error.message));
      }

      const deletePaymentBtn = event.target.closest("[data-delete-payment]");
      if (deletePaymentBtn && confirm("這會刪除此筆收款排程，確定刪除？")) {
        deletePaymentSchedule(deletePaymentBtn.dataset.deletePayment).catch(error => alert(error.message));
      }

      const deleteUserBtn = event.target.closest("[data-delete-user]");
      if (deleteUserBtn && confirm(`這會刪除員工「${deleteUserBtn.dataset.deleteUserName || ""}」的登入帳號，舊案件紀錄仍會保留。確定刪除？`)) {
        deleteEmployeeUser(deleteUserBtn.dataset.deleteUser).catch(error => alert(error.message));
      }

      const installmentBtn = event.target.closest("[data-create-installments]");
      if (installmentBtn) {
        createInstallmentSchedules(installmentBtn.dataset.createInstallments).catch(error => alert(error.message));
      }

      const revenueStatusBtn = event.target.closest("[data-revenue-status]");
      if (revenueStatusBtn) {
        state.revenueStatus = revenueStatusBtn.dataset.revenueStatus;
        state.revenueVisibleCount = 8;
        renderHistoricalRevenue();
      }

      const revenueToggleListBtn = event.target.closest("[data-revenue-toggle-list]");
      if (revenueToggleListBtn) {
        state.revenueListOpen = !state.revenueListOpen;
        state.revenueVisibleCount = 8;
        renderHistoricalRevenue();
      }

      const revenueMoreBtn = event.target.closest("[data-revenue-more]");
      if (revenueMoreBtn) {
        state.revenueVisibleCount += 8;
        renderHistoricalRevenue();
      }

      const revenueCollapseBtn = event.target.closest("[data-revenue-collapse]");
      if (revenueCollapseBtn) {
        state.revenueVisibleCount = 8;
        renderHistoricalRevenue();
      }

      const editRevenueBtn = event.target.closest("[data-edit-revenue-button]");
      if (editRevenueBtn) {
        const id = editRevenueBtn.dataset.editRevenueButton;
        state.editingRevenueId = String(state.editingRevenueId) === String(id) ? null : id;
        renderHistoricalRevenue();
      }

      const cancelRevenueEditBtn = event.target.closest("[data-cancel-revenue-edit]");
      if (cancelRevenueEditBtn) {
        state.editingRevenueId = null;
        renderHistoricalRevenue();
      }

      const deleteRevenueBtn = event.target.closest("[data-delete-revenue]");
      if (deleteRevenueBtn && confirm("這會刪除此筆歷史營收資料，確定刪除？")) {
        deleteHistoricalRevenue(deleteRevenueBtn.dataset.deleteRevenue).catch(error => alert(error.message));
      }
    });

    function applyRevenueSearch(value) {
      state.revenueQuery = value;
      state.revenueVisibleCount = 8;
      renderHistoricalRevenue();
      requestAnimationFrame(() => {
        const input = document.querySelector("#revenueSearch");
        if (input) {
          input.focus();
          input.setSelectionRange(input.value.length, input.value.length);
        }
      });
    }

    document.addEventListener("compositionstart", event => {
      if (event.target.id === "revenueSearch") revenueSearchComposing = true;
    });

    document.addEventListener("compositionend", event => {
      if (event.target.id !== "revenueSearch") return;
      revenueSearchComposing = false;
      clearTimeout(revenueSearchTimer);
      applyRevenueSearch(event.target.value);
    });

    document.addEventListener("input", event => {
      if (event.target.id !== "revenueSearch") return;
      if (revenueSearchComposing || event.isComposing) return;
      const value = event.target.value;
      clearTimeout(revenueSearchTimer);
      revenueSearchTimer = setTimeout(() => applyRevenueSearch(value), 180);
    });

    document.addEventListener("change", event => {
      if (event.target.matches("[data-split-employee]")) {
        updateCustomEmployeeField(event.target);
      }
      if (event.target.matches("[data-check]")) {
        updateChecklist(event.target.dataset.check, Number(event.target.dataset.index), event.target.checked).catch(error => alert(error.message));
      }
      if (event.target.matches("[data-status-for]")) {
        updateStatus(event.target.dataset.statusFor, event.target.value).catch(error => alert(error.message));
      }
    });

    document.addEventListener("wheel", event => {
      if (event.target.matches("input[type='number']") && document.activeElement === event.target) {
        event.preventDefault();
        event.target.blur();
      }
    }, { passive: false });

    els.loginForm.addEventListener("submit", login);
    els.logoutBtn.addEventListener("click", logout);
    els.closeModal.addEventListener("click", closeModal);
    els.caseModal.addEventListener("click", event => {
      if (event.target === els.caseModal) closeModal();
    });
    document.addEventListener("submit", event => {
      if (event.target.id === "caseForm") createCase(event).catch(error => alert(error.message));
      if (event.target.id === "companyRecordForm") createCompanyRecord(event).catch(error => alert(error.message));
      if (event.target.id === "studioExpenseForm") updateStudioExpenseModel(event).catch(error => alert(error.message));
      if (event.target.id === "historicalRevenueForm") createHistoricalRevenue(event).catch(error => alert(error.message));
      if (event.target.matches("[data-edit-revenue]")) updateHistoricalRevenue(event).catch(error => alert(error.message));
      if (event.target.id === "userForm") createUser(event).catch(error => alert(error.message));
      if (event.target.matches("[data-work-types-for]")) updateEmployeeWorkTypes(event).catch(error => alert(error.message));
      if (event.target.matches("[data-base-salary-for]")) updateEmployeeBaseSalary(event).catch(error => alert(error.message));
      if (event.target.matches("[data-reset-password-for]")) resetEmployeePassword(event).catch(error => alert(error.message));
      if (event.target.id === "passwordForm") updateMyPassword(event).catch(error => alert(error.message));
      if (event.target.id === "expenseForm") createExpense(event).catch(error => alert(error.message));
      if (event.target.id === "reviewForm") updateReview(event).catch(error => alert(error.message));
      if (event.target.id === "caseNotesForm") updateCaseNotes(event).catch(error => alert(error.message));
      if (event.target.id === "caseOwnerForm") updateCaseOwner(event).catch(error => alert(error.message));
      if (event.target.id === "caseFinancialForm") updateCaseFinancials(event).catch(error => alert(error.message));
      if (event.target.id === "deliveryForm") updateDelivery(event).catch(error => alert(error.message));
      if (event.target.id === "paymentScheduleForm") createPaymentSchedule(event).catch(error => alert(error.message));
    });

    restoreSession().catch(error => {
      state.apiError = error.message;
      renderApp();
    });

  </script>
</body>
</html>
